{% extends 'base.html' %}
{% block title %}검색 결과{% endblock %}

{% block content %}
<div class="container">
  <h1 style="margin-bottom:16px;">검색</h1>
  <form id="search-form" class="card form" style="margin-bottom:16px;">
    <textarea id="query" class="form-textarea" placeholder="궁금한 상황을 자연어로 적어보세요"></textarea>
    <button type="submit" class="btn-primary">검색</button>
  </form>
  <div id="category-tabs" class="filter-tabs"></div>
  <p id="extracted-keywords" class="meta-list" style="font-size:0.9rem;"></p>
  <p class="form-hint" style="text-align:left;color:var(--color-muted);font-size:0.85rem;">
    검색 결과는 참고용이며 법률 자문이 아닙니다.
  </p>

  <div id="laws-section" class="search-section"></div>
  <div id="precedents-section" class="search-section"></div>
  <div id="stories-section" class="search-section"></div>
  <div id="empty-area"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function () {
  const CATEGORY_LABELS = {
    housing: '전세/월세', labor: '직장/노동', consumer: '소비자',
    family: '이혼/가족', traffic: '교통사고', criminal: '형사',
    realestate: '부동산 매매', debt: '채권/채무', etc: '기타',
  };
  const CATEGORIES = ['housing','labor','consumer','family','traffic','criminal','realestate','debt','etc'];

  function getParams() {
    const u = new URL(window.location.href);
    return {
      q: u.searchParams.get('q') || '',
      category: u.searchParams.get('category') || '',
    };
  }

  function buildUrl(p) {
    const u = new URL(window.location.origin + '/search/');
    if (p.q) u.searchParams.set('q', p.q);
    if (p.category) u.searchParams.set('category', p.category);
    return u.pathname + (u.search ? u.search : '');
  }

  function renderTabs() {
    const p = getParams();
    const tabs = document.getElementById('category-tabs');
    tabs.innerHTML = '<a class="filter-tab' + (p.category === '' ? ' active' : '') + '" href="' + buildUrl({...p, category:''}) + '">전체</a>'
      + CATEGORIES.map(c =>
        '<a class="filter-tab' + (p.category === c ? ' active' : '') + '" href="' + buildUrl({...p, category:c}) + '">' + CATEGORY_LABELS[c] + '</a>'
      ).join('');
  }

  function lawCard(l) {
    return '<a class="story-card" href="/laws/' + l.id + '/"><div class="card card-hover">'
      + '<div class="story-meta"><span class="badge badge-secondary">' + window.escapeHtml(CATEGORY_LABELS[l.category] || l.category || '') + '</span>'
      + (l.matched_keywords || []).map(k => '<span class="keyword-badge">' + window.escapeHtml(k) + '</span>').join('') + '</div>'
      + '<h3 class="story-title">' + window.escapeHtml(l.law_name) + ' ' + window.escapeHtml(l.article_number) + '</h3>'
      + '<p class="story-snippet">' + window.escapeHtml(l.article_title || '') + '</p>'
      + (l.content_preview ? '<p class="story-snippet" style="-webkit-line-clamp:2;">' + window.escapeHtml(l.content_preview) + '</p>' : '')
      + '</div></a>';
  }

  function precedentCard(p) {
    return '<a class="story-card" href="/precedents/' + p.id + '/"><div class="card card-hover">'
      + '<div class="story-meta"><span class="badge badge-accent">' + window.escapeHtml(p.result_type_display || '') + '</span>'
      + '<span>' + window.escapeHtml(p.court || '') + '</span>'
      + '<span>' + window.escapeHtml(p.judgment_date || '') + '</span>'
      + (p.matched_keywords || []).map(k => '<span class="keyword-badge">' + window.escapeHtml(k) + '</span>').join('') + '</div>'
      + '<h3 class="story-title">' + window.escapeHtml(p.case_name || '') + '</h3>'
      + '<p class="story-snippet">' + window.escapeHtml(p.summary_preview || '') + '</p>'
      + '</div></a>';
  }

  function storyCard(s) {
    return '<a class="story-card" href="/stories/' + s.id + '/"><div class="card card-hover">'
      + '<div class="story-meta"><span class="badge badge-primary">' + window.escapeHtml(CATEGORY_LABELS[s.category] || s.category || '') + '</span>'
      + '<span>' + window.escapeHtml(s.author_display || '익명') + '</span>'
      + '<span>조회 ' + (s.view_count || 0) + '</span>'
      + (s.matched_keywords || []).map(k => '<span class="keyword-badge">' + window.escapeHtml(k) + '</span>').join('') + '</div>'
      + '<h3 class="story-title">' + window.escapeHtml(s.title) + '</h3>'
      + '</div></a>';
  }

  async function runSearch() {
    const p = getParams();
    document.getElementById('query').value = p.q;
    if (!p.q) {
      document.getElementById('extracted-keywords').textContent = '';
      ['laws-section','precedents-section','stories-section'].forEach(id => document.getElementById(id).innerHTML = '');
      document.getElementById('empty-area').innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><p>검색어를 입력해보세요.</p></div>';
      return;
    }
    document.getElementById('empty-area').innerHTML = '';
    try {
      const res = await fetch('/api/search/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: p.q, category: p.category || null }),
      });
      if (!res.ok) throw new Error('failed');
      const data = await res.json();
      const kws = (data.extracted_keywords || []).map(k => '<span class="keyword-badge">' + window.escapeHtml(k) + '</span>').join('');
      document.getElementById('extracted-keywords').innerHTML =
        '<span style="color:var(--color-muted);">검색 키워드:</span> ' + (kws || '<span style="color:var(--color-muted);">없음</span>');

      document.getElementById('laws-section').innerHTML =
        '<div class="search-section-title"><span class="icon">📖</span><h2>관련 법령</h2><span class="count">(' + data.counts.laws + '건)</span></div>'
        + (data.results.laws.length === 0
          ? '<div class="empty-state" style="padding:16px;"><p>매칭된 법령이 없습니다.</p></div>'
          : '<div class="story-list">' + data.results.laws.map(lawCard).join('') + '</div>');

      document.getElementById('precedents-section').innerHTML =
        '<div class="search-section-title"><span class="icon">⚖️</span><h2>관련 판례</h2><span class="count">(' + data.counts.precedents + '건)</span></div>'
        + (data.results.precedents.length === 0
          ? '<div class="empty-state" style="padding:16px;"><p>매칭된 판례가 없습니다.</p></div>'
          : '<div class="story-list">' + data.results.precedents.map(precedentCard).join('') + '</div>');

      document.getElementById('stories-section').innerHTML =
        '<div class="search-section-title"><span class="icon">💬</span><h2>비슷한 사연</h2><span class="count">(' + data.counts.stories + '건)</span></div>'
        + (data.results.stories.length === 0
          ? '<div class="empty-state" style="padding:16px;"><p>비슷한 사연이 없습니다.</p></div>'
          : '<div class="story-list">' + data.results.stories.map(storyCard).join('') + '</div>');

      const totalCount = data.counts.laws + data.counts.precedents + data.counts.stories;
      if (totalCount === 0 && (data.extracted_keywords || []).length > 0) {
        document.getElementById('empty-area').innerHTML = '<div class="empty-state"><div class="empty-icon">😕</div><p>"' + window.escapeHtml(p.q) + '" 와(과) 관련된 결과가 없습니다.</p><p>다른 키워드로 검색해보세요.</p></div>';
      }
    } catch (_) {
      document.getElementById('empty-area').innerHTML = '<div class="empty-state"><p>검색에 실패했습니다.</p></div>';
    }
  }

  document.getElementById('search-form').addEventListener('submit', e => {
    e.preventDefault();
    const q = document.getElementById('query').value.trim();
    const p = getParams();
    window.location.href = buildUrl({ q, category: p.category });
  });

  renderTabs();
  runSearch();
})();
</script>
{% endblock %}
