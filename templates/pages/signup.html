{% extends 'base.html' %}
{% block title %}회원가입{% endblock %}

{% block content %}
<div class="container narrow">
  <h1 style="text-align:center; margin-bottom:24px;">회원가입</h1>
  <form id="signup-form" class="card form" novalidate>
    <div class="form-row">
      <label class="form-label" for="username">아이디</label>
      <input type="text" id="username" name="username" class="form-input" required minlength="3" maxlength="30" autocomplete="username">
      <div class="form-error" data-field="username"></div>
    </div>
    <div class="form-row">
      <label class="form-label" for="email">이메일</label>
      <input type="email" id="email" name="email" class="form-input" required autocomplete="email">
      <div class="form-error" data-field="email"></div>
    </div>
    <div class="form-row">
      <label class="form-label" for="nickname">닉네임</label>
      <input type="text" id="nickname" name="nickname" class="form-input" required maxlength="30">
      <div class="form-error" data-field="nickname"></div>
    </div>
    <div class="form-row">
      <label class="form-label" for="password">비밀번호 (최소 8자)</label>
      <input type="password" id="password" name="password" class="form-input" required minlength="8" autocomplete="new-password">
      <div class="form-error" data-field="password"></div>
    </div>
    <div class="form-row">
      <label class="form-label" for="password2">비밀번호 확인</label>
      <input type="password" id="password2" name="password2" class="form-input" required minlength="8" autocomplete="new-password">
      <div class="form-error" data-field="password2"></div>
    </div>
    <button type="submit" class="btn-primary btn-lg" id="signup-submit">가입하기</button>
    <p class="form-hint">이미 계정이 있으신가요? <a href="/login/">로그인</a></p>
  </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('signup-form').addEventListener('submit', async function (e) {
  e.preventDefault();
  document.querySelectorAll('.form-error').forEach(function (el) { el.textContent = ''; });
  const form = e.target;
  const submit = document.getElementById('signup-submit');
  submit.disabled = true;

  const payload = {
    username: form.username.value.trim(),
    email: form.email.value.trim(),
    nickname: form.nickname.value.trim(),
    password: form.password.value,
    password2: form.password2.value,
  };

  try {
    await window.auth.signup(payload);
    window.showToast('회원가입 완료! 로그인해주세요.', 'success');
    setTimeout(function () { window.location.href = '/login/'; }, 800);
  } catch (errors) {
    if (errors && typeof errors === 'object' && !(errors instanceof Error)) {
      Object.keys(errors).forEach(function (field) {
        const el = document.querySelector('.form-error[data-field="' + field + '"]');
        if (el) {
          el.textContent = Array.isArray(errors[field]) ? errors[field][0] : String(errors[field]);
        }
      });
      const generic = errors.detail || errors.non_field_errors;
      if (generic) {
        window.showToast(Array.isArray(generic) ? generic[0] : String(generic), 'error');
      }
    } else {
      window.showToast('회원가입에 실패했습니다.', 'error');
    }
  } finally {
    submit.disabled = false;
  }
});
</script>
{% endblock %}
